<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Designer Architecture</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Leaflet CSS for Real Interactive Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Inter Typeface for strict component hierarchy -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        
        <!-- DEVICE PREVIEW -->
        <main class="preview-area">
            <div class="device-mockup">
                <div class="device-bezel">
                    
                    <!-- 60% MAP CANVAS -->
                    <div class="map-section">
                        <div id="real-map" class="map-container"></div>
                        <div class="map-monochrome-filter"></div>
                        
                        <!-- Top Status Block & Dynamic Island -->
                        <div class="top-status-block">
                            <!-- Status Bar -->
                            <div class="status-bar" id="status-bar">
                                <span class="time">9:41</span>
                                <div class="status-icons">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"></rect><line x1="22" y1="11" x2="22" y2="13"></line></svg>
                                </div>
                            </div>
                            
                            <!-- Dynamic Island Component -->
                            <div class="dynamic-island">
                                <div class="di-status">
                                    <span class="micro-typography font-medium">Driver arriving in 3 min</span>
                                </div>
                                <div class="camera-dot"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 40% BOTTOM SHEET COMPONENT -->
                    <div class="bottom-section">
                        
                        <!-- Single Full-Width Search Input -->
                        <div class="search-input-container interactive">
                            <h2 class="search-placeholder font-bold">Where to?</h2>
                            <!-- Minimal Line-Art Pin (Right-aligned) -->
                            <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        </div>
                        
                        <!-- Horizontal Grid Row (Exactly Three Chips) -->
                        <div class="memory-chip-grid">
                            
                            <div class="memory-chip interactive">
                                <svg class="chip-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                                <span class="chip-label font-medium">Work</span>
                            </div>
                            
                            <div class="memory-chip interactive">
                                <svg class="chip-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.7l-1.2 3.3c-.2.5.1 1.1.6 1.2l6.2 1.8L7 16l-3.5-.9c-.5-.1-.9.2-1.1.7l-.5 1.4c-.2.5.1 1.1.6 1.2l5.5 1.5 1.5 5.5c.1.5.7.8 1.2.6l1.4-.5c.5-.2.8-.6.7-1.1l-.9-3.5 2.8-2.3 1.8 6.2c.1.5.7.8 1.2.6l3.3-1.2c.5-.2.8-.6.7-1.1z"></path></svg>
                                <span class="chip-label font-medium">Airport</span>
                            </div>
                            
                            <div class="memory-chip interactive">
                                <svg class="chip-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                                <span class="chip-label font-medium">Home</span>
                            </div>
                            
                        </div>
                        
                        <!-- Home Indicator -->
                        <div class="home-indicator"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Leaflet JS for Real Maps -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
